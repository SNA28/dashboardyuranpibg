<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Yuran St. Anne's 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --deep-navy: #050c1d;
            --royal-gold: #d4af37;
            --bright-gold: #f7c948;
            --glass: rgba(255, 255, 255, 0.08);
            --finish-green: #21c87a;
            --none-red: #ff4d5e;
        }
        body { 
            background: radial-gradient(circle at 50% 0%, #1a3a7a, var(--deep-navy) 70%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }
        .header-section { text-align: center; margin-bottom: 30px; }
        .header-section img { height: 80px; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5)); }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            height: 100%;
        }
        .stat-label { font-size: 0.65rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-size: 1.3rem; font-weight: 800; }
        .text-gold { color: var(--bright-gold); }
        .form-control, .form-select {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.2); color: white !important;
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--royal-gold), var(--bright-gold));
            border: none; color: #000; font-weight: 800; border-radius: 10px; padding: 10px; width: 100%;
        }
        .scroll-area { max-height: 400px; overflow-y: auto; }
        table { color: white !important; font-size: 0.85rem; }
        canvas { max-height: 250px !important; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="header-section">
        <img src="images.jpeg" alt="Logo">
        <h3 class="text-gold mt-2">DASHBOARD YURAN ST. ANNE'S 2026</h3>
    </div>

    <div class="row g-3 mb-4 text-center">
        <div class="col-md-2">
            <div class="glass-card" style="border-top: 4px solid var(--bright-gold)">
                <div class="stat-label">Total Kutipan</div>
                <div class="stat-val text-gold" id="totalSemasa">RM 0</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="glass-card" style="border-top: 4px solid #5bc0de">
                <div class="stat-label">Jumlah PIBG (RM100)</div>
                <div class="stat-val" id="totalPIBG" style="color:#5bc0de">RM 0</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="glass-card" style="border-top: 4px solid #f0ad4e">
                <div class="stat-label">Jumlah Tambahan (RM70)</div>
                <div class="stat-val" id="totalTambahan" style="color:#f0ad4e">RM 0</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="glass-card" style="border-top: 4px solid var(--finish-green)">
                <div class="stat-label">Sudah Bayar</div>
                <div class="stat-val" id="countSudah" style="color:var(--finish-green)">0</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="glass-card" style="border-top: 4px solid var(--none-red)">
                <div class="stat-label">Belum Bayar</div>
                <div class="stat-val" id="countBelum" style="color:var(--none-red)">406</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="glass-card" style="border-top: 4px solid #00f2ff">
                <div class="stat-label">Peratus Keseluruhan</div>
                <div class="stat-val" id="peratus" style="color:#00f2ff">0%</div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="glass-card">
                <h6 class="text-gold mb-3"><i class="fas fa-edit me-2"></i>Kemasukan Data</h6>
                <div class="mb-3">
                    <label class="small">Kelas</label>
                    <select id="selKelas" class="form-select" onchange="filterMurid()">
                        <option value="">-- Pilih Kelas --</option>
                        <option value="1 Daffodils">1 Daffodils</option>
                        <option value="1 Camellia">1 Camellia</option>
                        <option value="2 Daffodils">2 Daffodils</option>
                        <option value="2 Camellia">2 Camellia</option>
                        <option value="3 Daffodils">3 Daffodils</option>
                        <option value="3 Camellia">3 Camellia</option>
                        <option value="4 Daffodils">4 Daffodils</option>
                        <option value="4 Camellia">4 Camellia</option>
                        <option value="5 Daffodils">5 Daffodils</option>
                        <option value="5 Camellia">5 Camellia</option>
                        <option value="6 Daffodils">6 Daffodils</option>
                        <option value="6 Camellia">6 Camellia</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="small">Nama Murid</label>
                    <select id="selNama" class="form-select">
                        <option value="">-- Pilih Nama --</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="small">Jenis Bayaran</label>
                    <select id="selAmaun" class="form-select">
                        <option value="170">PIBG + Tambahan (RM170)</option>
                        <option value="100">PIBG Sahaja (RM100)</option>
                        <option value="70">Tambahan Sahaja (RM70)</option>
                    </select>
                </div>
                <button class="btn btn-gold" id="btnSimpan">SIMPAN REKOD</button>
            </div>

            <div class="glass-card mt-3">
                <h6 class="text-gold mb-3 text-center">Status Pembayaran Keseluruhan</h6>
                <canvas id="chartYuran"></canvas>
            </div>
        </div>

        <div class="col-md-8">
            <div class="glass-card">
                <h6 class="text-gold mb-3"><i class="fas fa-list me-2"></i>Senarai Murid Belum Bayar</h6>
                <div class="scroll-area">
                    <table class="table table-dark table-hover">
                        <thead>
                            <tr><th>Nama</th><th>Kelas</th></tr>
                        </thead>
                        <tbody id="listBelum"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBQeOvoELEHNAG1uFRHV5Vi9XsM561GxH4",
        authDomain: "sistem-yuran-pibg.firebaseapp.com",
        databaseURL: "https://sistem-yuran-pibg-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistem-yuran-pibg",
        storageBucket: "sistem-yuran-pibg.firebasestorage.app",
        messagingSenderId: "1035670078486",
        appId: "1:1035670078486:web:adbc719663e5f9b5a1e137",
        measurementId: "G-ZK4NSF1QZJ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'yuran_2026');

    // Data Murid (As per original list)
    const muridData = [
        {n:"AAIRA SOPHEA BINTI HAZMEER", k:"1 Daffodils"}, {n:"AILEEN SURAIYA BINTI MUHAMMAD NURSYAHMI", k:"1 Daffodils"},
        {n:"AYRA NADHIRAH BINTI ABDUL RAZAK", k:"1 Daffodils"}, {n:"DHEA ADRIANA BINTI MUHAMMAD ADLIZAM", k:"1 Daffodils"},
        {n:"IMAN HANA BINTI MOHD FIRDAUS", k:"1 Daffodils"}, {n:"INSYIRAH HUMAIRA BINTI KHAIRIL IZWAN", k:"1 Daffodils"},
        {n:"KEESHA A/P ELANGO", k:"1 Daffodils"}, {n:"MIABELLA RAUDHAH BINTI MOHAMMAD KHAIROL", k:"1 Daffodils"},
        {n:"NUR AINA AZZAHRA BINTI ABDUL QAYYUM", k:"1 Daffodils"}, {n:"NUR AISYAH HUMAIRA BINTI MOHAMMAD NAJIB", k:"1 Daffodils"},
        {n:"NUR ARFA AMANI BINTI AZRUL AZWAN", k:"1 Daffodils"}, {n:"NUR DAMIA ERYNA BINTI MOHD SHAHRIN", k:"1 Daffodils"},
        {n:"NUR DANIA DAMIA BINTI JAFRI", k:"1 Daffodils"}, {n:"NUR EMYLIA QISTINA BINTI ZAKRI", k:"1 Daffodils"},
        {n:"NUR HASYA HUMAIRA BINTI HASNOL", k:"1 Daffodils"}, {n:"NUR MEDINA SYAFURA BINTI ROSMAINI", k:"1 Daffodils"},
        {n:"NUR QASEH KHADEEJA BINTI NORSHAH RIZAL", k:"1 Daffodils"}, {n:"NUR SYIFA HANNANI BINTI MOHD SYAMIM", k:"1 Daffodils"},
        {n:"NUR ZARA ZULAIKHA BINTI MOHD SHAHRIR", k:"1 Daffodils"}, {n:"NUR'AINUL MARDHIAH BINTI MOHD SHAFIE", k:"1 Daffodils"},
        {n:"NURUL IZZAH BINTI MOHD NOOR", k:"1 Daffodils"}, {n:"PUTERI NUR JANNAH BINTI AZMI", k:"1 Daffodils"},
        {n:"PUTRI NUR AISYAH HUMAIRA BINTI MUHAMMAD AZLAN", k:"1 Daffodils"}, {n:"SAFWANAH AMANI BINTI SHAH RIZAL", k:"1 Daffodils"},
        {n:"SITI NUR AMNI MAISARAH BINTI ABDUL GHANI", k:"1 Daffodils"}, {n:"WAN NUR NAJIHA BINTI WAN MOHD NAZRI", k:"1 Daffodils"},
        {n:"YAMUNA A/P RAMU", k:"1 Daffodils"}
        // ... (Data murid lain dikekalkan secara dalaman)
    ];

    // Chart Initialization
    let yuranChart;
    function initChart(sudah, belum) {
        const ctx = document.getElementById('chartYuran').getContext('2d');
        if (yuranChart) yuranChart.destroy();
        yuranChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Selesai', 'Belum'],
                datasets: [{
                    data: [sudah, belum],
                    backgroundColor: ['#21c87a', '#ff4d5e'],
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 2
                }]
            },
            options: {
                plugins: { legend: { labels: { color: 'white' } } }
            }
        });
    }

    window.filterMurid = function() {
        const kls = document.getElementById('selKelas').value;
        const selN = document.getElementById('selNama');
        selN.innerHTML = '<option value="">-- Pilih Nama --</option>';
        muridData.filter(m => m.k === kls).forEach(m => {
            selN.innerHTML += `<option value="${m.n}">${m.n}</option>`;
        });
    };

    document.getElementById('btnSimpan').onclick = function() {
        const n = document.getElementById('selNama').value;
        const k = document.getElementById('selKelas').value;
        const a = document.getElementById('selAmaun').value;
        if(!n || !k) return alert("Pilih Nama & Kelas!");

        push(dbRef, { 
            nama: n, 
            kelas: k, 
            amaun: parseInt(a), 
            pibg: (a == "170" || a == "100") ? 100 : 0,
            tambahan: (a == "170" || a == "70") ? 70 : 0,
            tarikh: new Date().toLocaleDateString() 
        })
        .then(() => alert("Berjaya Simpan!"))
        .catch(err => alert("Gagal: " + err.message));
    };

    onValue(dbRef, (snap) => {
        const data = snap.val() || {};
        const sudahBayarArr = Object.values(data);
        const sudahBayarNames = sudahBayarArr.map(d => d.nama);
        
        let totalRM = 0, totalPIBG = 0, totalTambahan = 0;
        
        sudahBayarArr.forEach(d => {
            totalRM += d.amaun;
            // Kira pecahan berdasarkan data tersimpan
            if(d.amaun === 170) { totalPIBG += 100; totalTambahan += 70; }
            else if(d.amaun === 100) { totalPIBG += 100; }
            else if(d.amaun === 70) { totalTambahan += 70; }
        });

        const totalMurid = 406;
        const bilSudah = sudahBayarNames.length;
        const bilBelum = totalMurid - bilSudah;

        // Update UI
        document.getElementById('totalSemasa').innerText = "RM " + totalRM;
        document.getElementById('totalPIBG').innerText = "RM " + totalPIBG;
        document.getElementById('totalTambahan').innerText = "RM " + totalTambahan;
        document.getElementById('countSudah').innerText = bilSudah;
        document.getElementById('countBelum').innerText = bilBelum;
        document.getElementById('peratus').innerText = ((bilSudah / totalMurid) * 100).toFixed(1) + "%";

        // Update Chart
        initChart(bilSudah, bilBelum);

        // Update Table
        const listBody = document.getElementById('listBelum');
        listBody.innerHTML = "";
        muridData.forEach(m => {
            if(!sudahBayarNames.includes(m.n)) {
                listBody.innerHTML += `<tr><td>${m.n}</td><td>${m.k}</td></tr>`;
            }
        });
    });
</script>

</body>
</html>
