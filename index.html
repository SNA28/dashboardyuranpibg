    <style>
        :root { 
            --deep-navy: #050c1d;
            --royal-gold: #d4af37;
            --bright-gold: #f7c948;
            --glass: rgba(255, 255, 255, 0.08);
            --finish-green: #21c87a;
            --half-orange: #ff9800;
            --none-red: #ff4d5e;
        }

        body { 
            background: radial-gradient(circle at 50% 0%, #1a3a7a, var(--deep-navy) 70%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }

        .header-section { text-align: center; margin-bottom: 30px; }
        .header-section img { height: 130px; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5)); }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .stat-label { font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-size: 1.6rem; font-weight: 800; }
        .text-gold { color: var(--bright-gold); }

        .form-control, .form-select {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.2); color: white !important;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--royal-gold), var(--bright-gold));
            border: none; color: #000; font-weight: 800; border-radius: 10px; padding: 10px; width: 100%;
        }

        .scroll-area { max-height: 350px; overflow-y: auto; }
        .table-custom { font-size: 0.85rem; color: #fff; }
        .badge-status { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; }
    </style>
</head>

        muridData.filter(m => m.k === k).forEach(m => {

        });

        document.getElementById('boxLain').style.display = (document.getElementById('selJenis').value === 'lain') ? 'block' : 'none';
    };

    window.simpan = function() {
        const n = document.getElementById('selNama').value;
        const k = document.getElementById('selKelas').value;
        const t = document.getElementById('selTarikh').value;
        const j = document.getElementById('selJenis').value;
        let a = (j === 'lain') ? parseFloat(document.getElementById('inputLain').value) : parseFloat(j);

        if(!n || isNaN(a)) return alert("Lengkapkan data!");
        push(dbRef, { nama: n, kelas: k, amaun: a, jenis: j, tarikh: t, ts: Date.now() });
    };

        const data = snap.val() || {};
        const tableTunggakan = document.getElementById('isiTunggakan');
        const boxRMKelas = document.getElementById('statKutipanKelas');
        tableTunggakan.innerHTML = ''; boxRMKelas.innerHTML = '';
        
        let totalSemasa = 0, totalPIBG = 0, totalTambahan = 0;
        let kRM = {}, muridBayar = {};

        Object.values(data).forEach(r => {
            totalSemasa += r.amaun;
            kRM[r.kelas] = (kRM[r.kelas] || 0) + r.amaun;
            muridBayar[r.nama] = (muridBayar[r.nama] || 0) + r.amaun;
            
            // Logik pecah jenis yuran
            if(r.amaun === 170) { totalPIBG += 100; totalTambahan += 70; }
            else if(r.amaun === 100) { totalPIBG += 100; }
            else if(r.amaun === 70) { totalTambahan += 70; }
            else { totalPIBG += r.amaun; } // Jika lain-lain, anggap masuk PIBG sementara
        });

        let selesai = 0, separuh = 0;
        muridData.forEach(m => {
            const dah = muridBayar[m.n] || 0;
            const baki = SASARAN_INDIVIDU - dah;
            if(dah >= SASARAN_INDIVIDU) selesai++;
            else {
                if(dah > 0) separuh++;
                tableTunggakan.innerHTML += `<tr><td>${m.n}</td><td>${m.k}</td><td>RM ${dah}</td><td class="text-danger">RM ${baki}</td>
                <td><span class="badge-status ${dah === 0 ? 'bg-danger' : 'bg-warning text-dark'}">${dah === 0 ? 'BELUM' : 'SEPARUH'}</span></td></tr>`;
            }
        });

        const belum = 406 - (selesai + separuh);
        document.getElementById('countBelum').innerText = belum;

        senaraiK.forEach(k => {
            boxRMKelas.innerHTML += `<tr><td>${k}</td><td class="text-end text-gold fw-bold">RM ${kRM[k] || 0}</td></tr>`;
        });

        const ctx = document.getElementById('myChart');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Selesai', 'Separuh', 'Belum'],
                datasets: [{ data: [selesai, separuh, belum], backgroundColor: ['#21c87a', '#ff9800', '#ff4d5e'], borderColor: 'transparent' }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    });
</script>
</body>
</html>
