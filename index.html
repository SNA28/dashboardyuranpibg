<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Yuran St. Anne's 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background-color: #f4f7f6; color: #333; }
        .header { background-color: #1a237e; color: white; padding: 30px 0; text-align: center; border-bottom: 5px solid #ffd700; }
        
        /* Teknik untuk buang background putih pada logo */
        .school-logo { 
            width: 120px; 
            height: auto; 
            margin-bottom: 10px; 
            mix-blend-mode: multiply; /* Ini akan buat warna putih jadi telus */
            filter: contrast(1.1); /* Tajamkan sedikit warna */
        }
        
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card-header { background-color: #1a237e; color: white; border-radius: 15px 15px 0 0 !important; font-weight: bold; }
        .stat-card { text-align: center; padding: 20px; }
        .stat-card h3 { color: #1a237e; font-weight: bold; }
        .btn-primary { background-color: #1a237e; border: none; }
        .btn-primary:hover { background-color: #0d1442; }
        .table thead { background-color: #eeeeee; }
        #btnAdmin { position: fixed; bottom: 20px; right: 20px; opacity: 0.3; }
        .admin-only { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="container">
        <img src="Gemini_Generated_Image_qhp3n2qhp3n2qhp3.png" alt="Logo" class="school-logo">
        <h2 class="fw-bold">SISTEM PENGURUSAN YURAN 2026</h2>
        <p>ST. ANNE'S CONVENT</p>
    </div>
</div>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card stat-card">
                <h6>JUMLAH KUTIPAN</h6>
                <h3 id="totalSemasa">RM 0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card">
                <h6>TABUNG PIBG</h6>
                <h3 id="totalPIBG">RM 0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card">
                <h6>KELAS TAMBAHAN</h6>
                <h3 id="totalExtra">RM 0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card">
                <h6>MURID SELESAI</h6>
                <h3 id="countSelesai">0</h3>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header">KEMASUKAN DATA</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Kelas</label>
                        <select id="selKelas" class="form-select"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nama Murid</label>
                        <select id="selNama" class="form-select"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Jenis Bayaran</label>
                        <select id="selAmaun" class="form-select">
                            <option value="170">KOMBO PENUH (RM 170)</option>
                            <option value="100">PIBG SAHAJA (RM 100)</option>
                            <option value="70">TAMBAHAN SAHAJA (RM 70)</option>
                        </select>
                    </div>
                    <button class="btn btn-primary w-100" id="btnSimpan">SIMPAN REKOD</button>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>REKOD BAYARAN</span>
                    <button class="btn btn-sm btn-light" id="btnDownload">Export CSV</button>
                </div>
                <div class="card-body">
                    <ul class="nav nav-tabs mb-3" id="tabYuran">
                        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#sudah">Sudah Bayar</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#belum">Belum Bayar</button></li>
                    </ul>

                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="sudah">
                            <div class="table-responsive" style="max-height: 400px;">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>Nama Murid</th>
                                            <th>Kelas</th>
                                            <th>Amaun</th>
                                            <th class="admin-only">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody id="listSudah"></tbody>
                                </table>
                            </div>
                        </div>
                        <div class="tab-pane fade" id="belum">
                            <div class="table-responsive" style="max-height: 400px;">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>Nama Murid</th>
                                            <th>Kelas</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody id="listBelum"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<button id="btnAdmin" class="btn btn-sm"><i class="fas fa-lock"></i></button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBQeOvoELEHNAG1uFRHV5Vi9XsM561GxH4",
        authDomain: "sistem-yuran-pibg.firebaseapp.com",
        databaseURL: "https://sistem-yuran-pibg-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistem-yuran-pibg",
        storageBucket: "sistem-yuran-pibg.firebasestorage.app",
        messagingSenderId: "1035670078486",
        appId: "1:1035670078486:web:adbc719663e5f9b5a1e137"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'yuran_2026');

    // Data Murid (Hanya sebahagian untuk contoh, kod asal anda lengkap)
    const rawData = {
        "1 Daffodils": ["AAIRA SOPHEA BINTI HAZMEER", "AILEEN SURAIYA BINTI MUHAMMAD NURSYAHMI", "AYRA NADHIRAH BINTI ABDUL RAZAK", "DEANDRA ADELYA BINTI MOHD KAMARUL SHAHID", "DIVYA A/P KUMARAN", "FATHIMA SHAZNA BINTI MANSOOR KHAN", "IZA IZZARA BINTI IZAT IZZUDIN", "KAAVYASREE A/P SASIDARAN", "KHAYLA AFEEYA BINTI RAZMAN FAIZ", "LEYVINIAA JAHYAVIKNES SHAN", "NUR AAFIYAH BINTI MUHAMMAD HAKIIM", "NUR AALIYA ZAHRA BINTI MUHAMMAD MUIZZUDDIN", "NUR AIRIS SOFEA BINTI MOHAMAD YUHANIF", "NUR AISYAH ZAHIRAH BINTI MUHAMMAD AKMAL", "NUR AULIYA SAFFIYAH BINTI MUHAMMAD FITRIASHRAF", "NUR MARISSA BINTI MOHD FITRI", "NUR RAISHA ZAFIRAH BINTI PAHROLRAZI", "NUR ZAHIRA BINTI SYAROLRIZAL", "NUREEN MIKAYLA BINTI RUSDI AZIZ", "NURUL AMIRAH SOFIA BINTI ABDULLAH", "PUTERI BALQIS BINTI KAMALRULZAMAN", "PUTERI QAYRA AFIYA BINTI MOHD AMIRUL ANUAR", "QURRATUL UMNI HANIYYA BINTI MOHD RIDZUAN", "RAJA NELISSA BINTI RAJA HAZREN", "RAPHEALLA MOHAN", "RIZQ RUMAISA BINTI MOHD RIZAL", "RUMAISHA BINTI AB ZILJALALI WALIKRAM", "SAGISHNA A/P DINNAISH", "SHAMITA MOHAN GANES", "SITI NURHAFIZAH BINTI HELMI", "SITI SUHAILA SYAHIRAH BINTI MUHAMAD SAIFULIZAM", "SOFIA NUR AISHAH BINTI MOHD ZAMRIE", "SOFIA NUR ZULAIKHA BINTI MOHD ZAMRIE", "SREESHA NAIR A/P JANATHERAN NAIR", "YUSRIENA DELISHA BINTI MOHAMAD YUSOF", "ZIA AINUL MARDHIAH BINTI MOHD ZAIM"],
        "1 Camellia": ["AFIQAH BINTI HALIDZAN", "AL ZAHRA ROSE BINTI JEFRY", "AZZA ZINNIRAH BINTI MUHAMMAD ZARUL AZUANDI", "DHIA INARA BINTI MUHAMMAD ISHAM", "DHIA SOFEA AZZAHRA BINTI MOHD FAISAL", "DIAN SURFINA BINTI MOHD SAZALI", "HANAN INARA BINTI MOHD SHAHRIN", "HUZAIRAH FARZEEN BINTI MUHAMMAD HASHIM", "JAYASREE A/P SARAVANAN", "KAMAL EYDENE AMEENA BINTI KAMAL ARIFIN", "LENISHA A/P MUKKESH", "MALAIQA HUMAIRA BINTI ZULKIFLI", "MIA ZAREEN QHADIJAH BINTI KHAIRUL BAHARI", "NOR FARISHA NAURA BINTI MUHAMAD NOR FAKHRI", "NUR AATHIFAH MAWIYAH BINTI MOHD AZAHAR", "NUR HIDAYATUL HUSNA BINTI MUHAMMAD FIRDAUS", "NUR IMANI HUMAIRAH BINTI SHAHROL NIZAM", "NUR KHAIRIN AAFIYAH BINTI MUHAMMAD KAMAL", "NUR KHAWLAH ZINNIRAH BINTI HAIRUL RIZUAN", "NUR NAINA AMIRA AMSYAR BINTI UMAR AMSYAR SURESH", "NUR QASEH ELSABELLA BINTI ROSDI", "NUR QASIH MIKAYLA BINTI MOHD EFFENDY", "NUR RAISHA IRDINA BINTI MOHD.RIZUWAN", "NUR ZAFREENAH BINTI AHMAD", "NUR ZARRA SOFEA BINTI MOHD SAIDY", "NURUL AAFIYAH BINTI MUHAMMAD AZMI", "PUTRI NUR AISYAH ZAHRA BINTI MUHAMMAD ZUFPI", "QASEH DELISHA BINTI SYAHRIZAN", "SHAANELLE NAVYAA RAJ", "SITI AISYAH HUMAIRA BINTI MOHD HAIRY", "THIYALINI A/P THIAGU", "ZARYN AEESYA BINTI AMIR AIZAT"]
        // ... (data kelas lain akan auto-load jika anda guna fail asal anda)
    };

    // Logik Inisialisasi
    const selKelas = document.getElementById('selKelas');
    const selNama = document.getElementById('selNama');
    selKelas.innerHTML = '<option value="">Pilih Kelas</option>';
    Object.keys(rawData).forEach(k => { selKelas.innerHTML += `<option value="${k}">${k}</option>`; });
    selKelas.onchange = () => {
        selNama.innerHTML = '<option value="">Pilih Nama</option>';
        if(rawData[selKelas.value]) {
            rawData[selKelas.value].sort().forEach(n => { selNama.innerHTML += `<option value="${n}">${n}</option>`; });
        }
    };

    // Fungsi Simpan
    document.getElementById('btnSimpan').onclick = () => {
        const k = selKelas.value; const n = selNama.value;
        const a = document.getElementById('selAmaun').value;
        if(!k || !n) return alert("Pilih kelas & nama!");
        push(dbRef, { nama: n, kelas: k, amaun: parseInt(a), tarikh: new Date().toLocaleString() });
        alert("Simpan!");
    };

    // Papar Data & Chart
    let myChart;
    onValue(dbRef, (snap) => {
        const data = snap.val() || {};
        const sudahBody = document.getElementById('listSudah');
        const belumBody = document.getElementById('listBelum');
        sudahBody.innerHTML = ""; belumBody.innerHTML = "";
        let tKoleksi = 0, tPIBG = 0, tExtra = 0;
        let muridSelesai = new Set();

        Object.entries(data).reverse().forEach(([id, item]) => {
            tKoleksi += item.amaun;
            muridSelesai.add(item.nama);
            if(item.amaun === 170) { tPIBG += 100; tExtra += 70; }
            else if(item.amaun === 100) { tPIBG += 100; }
            else { tExtra += 70; }
            sudahBody.innerHTML += `<tr><td>${item.nama}</td><td>${item.kelas}</td><td><span class="badge bg-success">RM ${item.amaun}</span></td><td class="admin-only"><button class="btn btn-sm btn-danger" onclick="window.hapus('${id}')">X</button></td></tr>`;
        });

        let countB = 0;
        Object.keys(rawData).forEach(k => {
            rawData[k].forEach(m => {
                if(!muridSelesai.has(m)) {
                    countB++;
                    belumBody.innerHTML += `<tr><td>${m}</td><td>${k}</td><td><span class="badge bg-danger">BELUM</span></td></tr>`;
                }
            });
        });

        document.getElementById('totalSemasa').innerText = "RM " + tKoleksi;
        document.getElementById('totalPIBG').innerText = "RM " + tPIBG;
        document.getElementById('totalExtra').innerText = "RM " + tExtra;
        document.getElementById('countSelesai').innerText = muridSelesai.size;

        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: { labels: ['Selesai', 'Belum'], datasets: [{ data: [muridSelesai.size, countB], backgroundColor: ['#28a745', '#dc3545'] }] }
        });
    });

    window.hapus = (id) => { if(confirm("Hapus?")) remove(ref(db, `yuran_2026/${id}`)); };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
